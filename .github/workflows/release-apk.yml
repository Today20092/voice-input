name: Build Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build dev debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;28.2.13676358" "cmake;3.22.1"
          yes | sdkmanager --licenses >/dev/null

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build APK
        run: ./gradlew :app:assembleDevDebug

      - name: Rename APK
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp app/build/outputs/apk/dev/debug/app-dev-debug.apk "release/futo-parakeet-voiceinput-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: futo-parakeet-voiceinput-apk
          path: release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: First Working Parakeet Version
          body: |
            First working version of the FUTO Voice Input Parakeet fork.

            This release builds a sideloadable dev debug APK with the Parakeet backend integrated into the FUTO Voice Input app.

            The Parakeet integration and repository changes in this fork were built with AI assistance using Codex (GPT-5).
          files: release/*.apk
          generate_release_notes: true
