name: Build Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build dev debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;28.2.13676358" "cmake;3.22.1"
          yes | sdkmanager --licenses >/dev/null

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build APK
        run: ./gradlew :app:assembleDevDebug

      - name: Rename APK
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp app/build/outputs/apk/dev/debug/app-dev-debug.apk "release/futo-parakeet-voiceinput-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: futo-parakeet-voiceinput-apk
          path: release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: FUTO Parakeet Voice Input ${{ github.ref_name }}
          body: |
            Runtime-download Parakeet release of the FUTO Voice Input fork.

            This APK no longer packages the Parakeet ONNX model files directly. The app downloads the Parakeet model on first use or from the Model Options screen, which keeps the APK much smaller while preserving offline transcription after the model is installed.

            The Parakeet integration and repository changes in this fork were built with AI assistance using Codex (GPT-5).
          files: release/*.apk
          generate_release_notes: true
